<!DOCTYPE html>
<html lang="en">

<head>
  <title>Cokonet Academy - DevOps Course</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(rgba(247, 249, 252, 0.4), rgba(247, 249, 252, 0.4)), url('2903.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #1a202c;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header Styling */
    header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 30px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      flex-wrap: wrap;
      gap: 20px;
    }

    header h2 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* YouTube Button */
    .youtube-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      padding: 12px 28px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .youtube-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 25px rgba(220, 38, 38, 0.25);
    }

    /* Main Section Layout */
    section {
      display: flex;
      justify-content: center;
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 60px auto;
      padding: 0 20px;
    }

    /* Main Content Article */
    article {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      padding: 50px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
    }

    article h1 {
      font-size: 2.2rem;
      color: #0f172a;
      margin-bottom: 25px;
      font-weight: 700;
      position: relative;
      padding-bottom: 12px;
    }

    article h1::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      height: 4px;
      width: 60px;
      background: #3b82f6;
      border-radius: 2px;
    }

    article p,
    article ul {
      font-size: 0.95rem;
      color: #334155;
      line-height: 1.7;
      margin-bottom: 16px;
      font-weight: 400;
    }

    article ul {
      padding-left: 24px;
    }

    article ul li {
      margin-bottom: 12px;
    }

    /* Footer Styling */
    footer {
      background-color: #0f172a;
      padding: 24px;
      text-align: center;
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: auto;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header {
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }

      article {
        padding: 30px 20px;
      }

      header h2 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h2>DevOps Course By Cokonet</h2>
    <a href="https://youtube.com/@cokonetacademyofficial?si=LPdcDhak9_i5j680" class="youtube-btn" target="_blank"
      rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
      </svg>
      YouTube Channel
    </a>
  </header>

  <section>
    <article>
      <h1>Agenda</h1>
      <ul>
        <li>Learn DevOps with strong foundational knowledge and practical understanding.</li>
        <li>This is a modern sample website showcasing clean UI and responsive design.</li>
        <li>Master cloud deployments and CI/CD pipelines.</li>
      </ul>
    </article>
  </section>

  <footer>
    <p>&copy; CoconutTechnologies</p>
  </footer>

</body>

</html>
